<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze TD Prototype</title>
    <style>
        :root {
            --bg: #000000; 
            --panel: #1a1a1a;
            --text: #eee;
            --accent: #4caf50;
            --danger: #f44336;
            --gold: #ffd700;
        }
        body {
            margin: 0;
            padding: 20px;
            background-color: #000000; 
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            gap: 20px;
            user-select: none;
        }
        #game-container {
            position: relative;
            background-color: var(--bg);
            border: 2px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        #ui-panel {
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card {
            background-color: var(--panel);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .stat-box {
            background: linear-gradient(145deg, #222, #111);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05), 0 4px 6px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .stat-box::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; }
        .stat-box.lives::before { background: var(--danger); }
        .stat-box.gold::before { background: var(--gold); }
        .stat-box.wave::before { background: #fff; }
        .stat-box.level::before { background: #2196F3; }
        .stat-label { font-size: 0.75em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value {
            font-size: 1.5em;
            font-weight: 900;
            margin-top: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        button {
            width: 100%;
            padding: 8px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            margin-top: 5px;
        }
        button:hover:not(:disabled) { background-color: #444; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-accent { background-color: var(--accent); color: #000; }
        .btn-accent:hover:not(:disabled) { background-color: #45a049; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover:not(:disabled) { background-color: #d32f2f; }
        .btn-shop { background-color: #4b0082; color: #fff; border-color: #6a0dad; }
        .btn-shop:hover:not(:disabled) { background-color: #6a0dad; }
        
        .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; border: 1px solid rgba(255,255,255,0.2); }
        
        #detailed-stats {
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 5px; 
            background: #111; 
            padding: 8px; 
            border-radius: 4px; 
            font-family: monospace; 
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .recipe-hint {
            position: relative;
            font-size: 0.85em;
            background: #222;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            border-left: 4px solid var(--accent);
            transition: 0.2s;
        }
        .recipe-hint:hover.clickable-recipe {
            background-color: #333 !important;
            transform: scale(1.02);
            cursor: pointer;
        }
        
        #global-tooltip {
            display: none;
            position: fixed;
            background: #111;
            border: 1px solid var(--gold);
            padding: 10px;
            border-radius: 6px;
            z-index: 9999;
            width: max-content;
            color: #fff;
            font-family: monospace;
            font-size: 0.95em;
            box-shadow: 0 10px 25px rgba(0,0,0,0.9);
            pointer-events: none;
            text-align: center;
            line-height: 1.4;
        }

        .menu-item:hover { background-color: #444 !important; }
        
        .modal-bg {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid #444; 
            width: 80%; max-width: 800px; max-height: 80vh; overflow-y: auto; color: #ccc;
        }
        .modal-content h3 { color: white; margin-top: 0; }
        .modal-close { margin-top: 20px; width: auto; padding: 10px 30px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <div id="menu-container" style="position: absolute; top: 20px; right: 20px; z-index: 100;">
        <button id="btn-menu" style="width: 40px; height: 40px; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; margin: 0;">
            <div style="width: 20px; height: 2px; background: white;"></div>
            <div style="width: 20px; height: 2px; background: white;"></div>
            <div style="width: 20px; height: 2px; background: white;"></div>
        </button>
        <div id="menu-dropdown" style="display: none; position: absolute; top: 50px; right: 0; background: var(--panel); border: 1px solid #444; border-radius: 4px; width: 160px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
            <button id="btn-restart" class="menu-item" style="border:none; border-bottom: 1px solid #444; margin:0; border-radius: 4px 4px 0 0; background: transparent; text-align: left; padding: 12px; width: 100%;">Restart Game</button>
            <button id="btn-elements" class="menu-item" style="border:none; border-bottom: 1px solid #444; margin:0; border-radius: 0; background: transparent; text-align: left; padding: 12px; width: 100%;">Elements Info</button>
            <button id="btn-waves" class="menu-item" style="border:none; border-bottom: 1px solid #444; margin:0; border-radius: 0; background: transparent; text-align: left; padding: 12px; width: 100%;">Waves Info</button>
            <button class="menu-item" style="border:none; margin:0; border-radius: 0 0 4px 4px; background: transparent; text-align: left; padding: 12px; width: 100%; color: #aaa;">Settings (WIP)</button>
        </div>
    </div>

    <div id="restart-modal" class="modal-bg">
        <div style="background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid #444; text-align: center; width: 250px;">
            <h3 style="margin-top: 0; color: white;">Are you sure?</h3>
            <p style="font-size: 0.9em; color: #ccc;">This will restart the game from Wave 1.</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="btn-restart-yes" class="btn-danger">Yes</button>
                <button id="btn-restart-no" class="btn-accent">No</button>
            </div>
        </div>
    </div>

    <div id="elements-modal" class="modal-bg"><div class="modal-content"><div id="elements-modal-content"></div><button class="btn-accent modal-close" onclick="document.getElementById('elements-modal').style.display='none'">Close</button></div></div>
    <div id="waves-modal" class="modal-bg"><div class="modal-content"><div id="waves-modal-content"></div><button class="btn-accent modal-close" onclick="document.getElementById('waves-modal').style.display='none'">Close</button></div></div>

    <div id="global-tooltip"></div>

    <div id="game-container"><canvas id="gameCanvas" width="1152" height="1152"></canvas></div>

    <div id="ui-panel">
        <div class="card">
            <h2 style="margin-top:0">Status</h2>
            <div class="stats-grid">
                <div class="stat-box lives"><div class="stat-label">Lives</div><div class="stat-value" style="color:var(--danger)" id="ui-lives">50</div></div>
                <div class="stat-box gold"><div class="stat-label">Gold</div><div class="stat-value" style="color:var(--gold)" id="ui-gold">30</div></div>
                <div class="stat-box wave"><div class="stat-label">Wave</div><div class="stat-value" style="color:#fff" id="ui-wave">1</div></div>
                <div class="stat-box level"><div class="stat-label">Builder Level</div><div class="stat-value" style="color:#2196F3" id="ui-level">1</div></div>
            </div>
            <div style="margin-bottom:10px;">EXP: <span id="ui-exp">0</span> / <span id="ui-exp-req">10</span></div>
            <button id="btn-levelup" class="btn-accent" disabled>Level Up</button>
            
            <div id="spawn-chances" style="margin-top:15px; font-size:0.8em; color:#aaa;">
                <div style="margin-bottom: 5px; font-weight: bold;">Spawn Chances (Level <span id="chance-lvl">1</span>):</div>
                <div style="display:flex; justify-content:space-between; text-align:center; background:#111; padding:8px 5px; border-radius:4px; border: 1px solid #333;">
                    <div><div style="color:#fff; margin-bottom:2px;">T1</div><div id="chc-1">70%</div></div>
                    <div><div style="color:#fff; margin-bottom:2px;">T2</div><div id="chc-2">20%</div></div>
                    <div><div style="color:#fff; margin-bottom:2px;">T3</div><div id="chc-3">10%</div></div>
                    <div><div style="color:#fff; margin-bottom:2px;">T4</div><div id="chc-4">0%</div></div>
                    <div><div style="color:#fff; margin-bottom:2px;">T5</div><div id="chc-5">0%</div></div>
                </div>
            </div>

            <button id="btn-startwave" class="btn-accent" style="margin-top:15px; display:none; padding:15px; font-size:1.1em; font-weight:bold; border-radius: 8px;">START WAVE</button>
        </div>

        <div class="card" id="action-panel">
            <h3 id="phase-title" style="margin-top:0">Phase: Building</h3>
            <div id="next-wave-info" style="color:var(--gold); margin-bottom:5px; font-size:0.85em; background:#111; padding:5px; border-radius:4px;"></div>
            <p id="phase-desc" style="font-size:0.9em; color:#ccc; margin-top:0;">Place markers on the grid.</p>
            
            <div id="selection-actions" style="display:none; margin-top:10px;">
                <div id="selected-info" style="margin-bottom:10px; font-weight:bold; font-size:1.1em;">None</div>
                <button id="btn-keep" class="btn-accent" style="display:none; margin-bottom:5px;">Keep Tower</button>
                <button id="btn-uplevel" class="btn-accent" style="display:none; margin-bottom:10px; background-color:#2196F3; border-color:#0d47a1;">Up-Level (Merge 3x)</button>
                <button id="btn-delevel" class="btn-danger" style="display:none; margin-bottom:10px;">De-Level (5 Gold)</button>
                
                <div id="craft-actions"></div> 
                <div id="detailed-stats"></div>
                <div id="recipe-hints" style="margin-bottom:10px; max-height: 250px; overflow-y: auto; padding-right: 5px;"></div>
            </div>
        </div>

        <div class="card" id="shop-panel">
            <h3 style="margin-top:0; color:var(--gold);">Mystery Shop</h3>
            <div style="font-size:0.85em; color:#aaa; margin-bottom:10px;">Select an object or buy global buffs!</div>
            <div id="shop-items" style="max-height: 200px; overflow-y: auto; padding-right: 5px;"></div>
        </div>
    </div>

function isExclusionZone(x, y) { return false; } 
function getNeighbors(x, y) {
    let n = [];
    if (x > 0 && !grid[y][x-1]) n.push({x: x-1, y: y});
    if (x < COLS-1 && !grid[y][x+1]) n.push({x: x+1, y: y});
    if (y > 0 && !grid[y-1][x]) n.push({x: x, y: y-1});
    if (y < ROWS-1 && !grid[y+1][x]) n.push({x: x, y: y+1});
    return n;
}
function bfs(start, end) {
    let q = [start], cameFrom = new Map(), visited = new Set();
    visited.add(`${start.x},${start.y}`);
    while (q.length > 0) {
        let curr = q.shift();
        if (curr.x === end.x && curr.y === end.y) { let path = [], c = curr; while (c) { path.push(c); c = cameFrom.get(`${c.x},${c.y}`); } return path.reverse(); }
        for (let next of getNeighbors(curr.x, curr.y)) { let key = `${next.x},${next.y}`; if (!visited.has(key)) { q.push(next); visited.add(key); cameFrom.set(key, curr); } }
    }
    return null;
}
function calculateFullPath() {
    let fPath = [];
    for (let i = 0; i < WAYPOINTS.length - 1; i++) { let seg = bfs(WAYPOINTS[i], WAYPOINTS[i+1]); if (!seg) return null; if (i > 0) seg.shift(); fPath = fPath.concat(seg); }
    return fPath;
}
function canPlace(x, y) {
    if (grid[y][x] !== null) return false;
    for (let wp of WAYPOINTS) if (x === wp.x && y === wp.y) return false; 
    grid[y][x] = 'TEMP'; let path = calculateFullPath(); grid[y][x] = null; 
    return path !== null;
}

function precalculateWave() {
    let totalCount = 10 + bonusEnemies;
    let isBossWave = (waveNumber % 10 === 0);
    let isInvisWave = (waveNumber % 7 === 0);

    let availableAuras = ['DISARM_AURA', 'SLOW_AURA'];
    let availableSelfBuffs = ['SHIELD', 'REGEN', 'DASH', 'IMMUNE', 'PHASING', 'JUMPER'];

    waveEnemyQueue = [];

    if (waveNumber <= 5) {
        for(let i=0; i<totalCount; i++) waveEnemyQueue.push({ isBoss: false, buff: null, isInvis: isInvisWave });
    } else if (isBossWave) {
        let bossCount = waveNumber >= 30 ? 3 : 2;
        totalCount = bossCount; 
        let shuffledBuffs = [...availableSelfBuffs].sort(() => 0.5 - Math.random());
        if (waveNumber > 20) shuffledBuffs = [...availableSelfBuffs, ...availableAuras].sort(() => 0.5 - Math.random());
        for (let i=0; i<bossCount; i++) waveEnemyQueue.push({ isBoss: true, buff: shuffledBuffs[i], isInvis: false });
    } else {
        let buffDistribution = [];
        if (waveNumber <= 20) {
            let buff = availableSelfBuffs[Math.floor(Math.random() * availableSelfBuffs.length)];
            let numBuffed = Math.floor(Math.random() * 4) + 1;
            for(let i=0; i<totalCount; i++) buffDistribution.push(i < numBuffed ? buff : null);
            buffDistribution.sort(() => 0.5 - Math.random());
        } else {
            let numFactions = waveNumber >= 30 ? 3 : 2;
            let allBuffs = [...availableSelfBuffs, ...availableAuras, null];
            let chosenBuffs = [];
            for(let i=0; i<numFactions; i++) {
                let b = allBuffs[Math.floor(Math.random() * allBuffs.length)];
                if (chosenBuffs.includes(b) && b !== null) b = null; 
                chosenBuffs.push(b);
            }
            for(let i=0; i<totalCount; i++) buffDistribution.push(chosenBuffs[i % numFactions]);

            let auraCount = 0; let maxAuras = Math.floor(Math.random() * 4) + 1;
            for(let i=0; i<totalCount; i++) {
                if (availableAuras.includes(buffDistribution[i])) {
                    auraCount++;
                    if (auraCount > maxAuras) buffDistribution[i] = null;
                }
            }
            buffDistribution.sort(() => 0.5 - Math.random());
        }
        for (let i=0; i<totalCount; i++) waveEnemyQueue.push({ isBoss: false, buff: buffDistribution[i], isInvis: isInvisWave });
    }
    waveEnemiesToSpawn = waveEnemyQueue.length;
    leakedThisWave = false;

    let infoText = `Wave ${waveNumber} - ${totalCount} Enemies`;
    if (isBossWave) infoText += ` <span style="color:#ff00ff">[BOSS]</span>`;
    if (isInvisWave && !isBossWave) infoText += ` <span style="color:#aaa">[INVISIBLE]</span>`;
    let uniqueBuffs = [...new Set(waveEnemyQueue.map(e => e.buff).filter(b => b))];
    if (uniqueBuffs.length > 0) infoText += `<br><span style="color:#ccc; font-weight:normal">Traits: ${uniqueBuffs.join(', ')}</span>`;
    document.getElementById('next-wave-info').innerHTML = infoText;
}

function calcTowerStats(t) {
    t.baseDamage = t.element.damage * t.tier;
    t.baseSpeed = Math.max(10, t.element.speed - (t.tier * 2));
    t.baseCrit = 0.10 + (t.recipe?.critBonus || 0);
    t.critMultBonus = t.recipe?.critMultBonus || 0;
    t.splash = t.element.splash || 0;
    t.range = t.element.range;
    t.burn = t.element.burn || 0;
    t.slow = t.element.slow || 0;
    t.pierce = t.recipe?.pierce || 0;
    t.poison = t.recipe?.applyPoison || 0;
    t.multiTarget = t.recipe?.multiTarget || 1;
    t.stunChc = t.recipe?.stunChc || 0;
    t.stunDur = t.recipe?.stunDur || 0;
    t.seeInvisible = t.isCombo ? (t.recipe?.seeInvis || false) : (t.element?.seeInvis || false);
    
    if (t.isCombo) {
        if (t.recipe.type === 'SUPPORT') { t.baseDamage *= 0.5; t.range *= 0.8; } 
        else { t.baseDamage *= (t.recipe.dmgMult || 2.0); t.range *= (t.recipe.rngMult || 1.5); }
        if(t.recipe.spdMult) t.baseSpeed *= t.recipe.spdMult;
        if(t.recipe.splashMult) t.splash *= t.recipe.splashMult;
        if(t.recipe.applyBurn) t.burn = t.recipe.applyBurn; 
        if(t.recipe.applySlow) t.slow = t.recipe.applySlow;
    }
}

    let d_crt = Math.floor((tower.baseCrit + tower.buffs.crit + (tower.buffs.permCrit||0))*100);
    let d_spl = tower.splash ? tower.splash.toFixed(1) : '0';
    let d_ag = tower.element ? tower.element.type : 'N/A';
    let p_val = Math.floor((tower.pierce + tower.buffs.pierce) * 100);

    dStats.innerHTML = `

function getTowerInventory() {

    for (let t of towers) {

        else { let k = `${t.element.name}_${t.tier}`; base[k] = (base[k] || []).concat(t); }

}

function rollElement() {
    const keys = Object.keys(ELEMENTS);
    let elKey = keys[Math.floor(Math.random() * keys.length)];
    let p = SPAWN_CHANCES[builderLevel - 1], roll = Math.random() * 100, sum = 0, tier = 1;
    for (let i = 0; i < 5; i++) { sum += p[i]; if (roll <= sum) { tier = i + 1; break; } }
    return { element: ELEMENTS[elKey], tier: tier };
}

    };
    calcTowerStats(t); towers.push(t); grid[kept.y][kept.x] = 'TOWER';

function processCombine(baseTower, recipe) {
    let inv = getTowerInventory(), consumed = [];
    let nBase = { ...recipe.reqBase }, nCombo = { ...recipe.reqCombo };

    if (baseTower.isCombo && nCombo[baseTower.recipe.id]) nCombo[baseTower.recipe.id]--;
    else if (!baseTower.isCombo) { let k = `${baseTower.element.name}_${baseTower.tier}`; if (nBase[k]) nBase[k]--; }
    
    for (let r in nBase) for (let i = 0; i < nBase[r]; i++) consumed.push(inv.base[r].find(tow => tow !== baseTower && !consumed.includes(tow)));
    for (let r in nCombo) for (let i = 0; i < nCombo[r]; i++) consumed.push(inv.combo[r].find(tow => tow !== baseTower && !consumed.includes(tow)));

    for (let c of consumed) { towers = towers.filter(t => t !== c); stones.push({x: c.x, y: c.y}); grid[c.y][c.x] = 'STONE'; }

    baseTower.isCombo = true; baseTower.recipe = recipe; baseTower.comboName = recipe.name; baseTower.comboColor = recipe.color; baseTower.tier += 2; 
    baseTower.chain = recipe.chain || 0; baseTower.freezeChc = recipe.freezeChc || 0; baseTower.freezeDur = recipe.freezeDur || 0;
    baseTower.glowColor = null;
    
    calcTowerStats(baseTower); selectedTower = baseTower; cachedPath = calculateFullPath(); updateUI();
}

function processTempCombine(selectedIndex, recipe) {
    let baseSpawn = unrevealedSpawns[selectedIndex];
    let consumed = [], nBase = { ...recipe.reqBase };
    for (let req in nBase) {
        for (let i = 0; i < nBase[req]; i++) {
            let foundIdx = unrevealedSpawns.findIndex((s, idx) => !consumed.includes(idx) && `${s.element.name}_${s.tier}` === req);
            consumed.push(foundIdx);
        }
    }

    let newTower = { x: baseSpawn.x, y: baseSpawn.y, element: baseSpawn.element, tier: baseSpawn.tier, cooldown: 0, isCombo: false, buffs: { damage: 0, speed: 0, crit: 0, range: 0, pierce: 0, trueSight: false, antiCC: false }, glowColor: null };
    newTower.isCombo = true; newTower.recipe = recipe; newTower.comboName = recipe.name; newTower.comboColor = recipe.color; newTower.tier += 2; 
    newTower.chain = recipe.chain || 0; newTower.freezeChc = recipe.freezeChc || 0; newTower.freezeDur = recipe.freezeDur || 0;
    
    calcTowerStats(newTower); towers.push(newTower); grid[baseSpawn.y][baseSpawn.x] = 'TOWER';

    for (let i = 0; i < unrevealedSpawns.length; i++) {
        if (!consumed.includes(i)) { let s = unrevealedSpawns[i]; stones.push({x: s.x, y: s.y}); grid[s.y][s.x] = 'STONE'; }
    }
    unrevealedSpawns = []; selectedSpawnIndex = -1; selectedTower = newTower; cachedPath = calculateFullPath(); state = STATES.BUILD_COMBINE;
    if (waveNumber % 3 === 1) refreshShop(); updateUI();
}

function spawnEnemy() {
    let def = waveEnemyQueue.shift();
    let hpMult = Math.pow(1.25, waveNumber);
    let baseHp = def.isBoss ? 500 : 20;
    let spdMult = 1 + (waveNumber * 0.05);
    let baseSpd = def.isBoss ? 0.8 : 1.2;
    
    let enemy = {
        x: WAYPOINTS[0].x * CELL_SIZE + CELL_SIZE/2, y: WAYPOINTS[0].y * CELL_SIZE + CELL_SIZE/2, pathIndex: 0,
        hp: baseHp * hpMult, maxHp: baseHp * hpMult, speed: baseSpd * spdMult,
        type: (Math.random() > 0.7 && !def.isBoss && !def.isInvis && waveNumber > 5) ? 'AIR' : 'GRND',
        isBoss: def.isBoss, invisible: def.isInvis, slowTimer: 0, burnTimer: 0, freezeTimer: 0, freezeCount: 0, poisonTimer: 0, armorDebuff: 0, stunTimer: 0, buffs: [],
        armor: waveNumber * 2 
    };

    if (def.buff) {
        enemy.buffs.push(def.buff);
        if (def.buff === 'SHIELD') enemy.shield = enemy.maxHp * 0.5; 
        if (def.buff === 'DASH') enemy.dashTimer = 0;
        if (def.buff === 'IMMUNE') enemy.armor = Math.floor(enemy.armor * 0.5);
        if (def.buff === 'PHASING') { enemy.phaseCooldown = 180; enemy.phaseTimer = 0; }
        if (def.buff === 'JUMPER') { enemy.lastJumpThreshold = 0.8; }
    }
    if (zaWarudoUnlocked) enemy.zaWarudoTimer = 60 * 30; 
    enemies.push(enemy);
}

function damageEnemy(e, amt, pTower, isCrit = false) {
    if (e.buffs.includes('DASH')) e.dashTimer = 60; 
    if (e.phaseTimer > 0) return; 
    
    let pierce = (pTower && pTower.pierce ? pTower.pierce : 0) + (pTower ? pTower.buffs.pierce : 0);
    let effArmor = Math.max(0, e.armor * (1 - pierce) - (e.armorDebuff || 0));
    let dmgReduction = 100 / (100 + effArmor);
    amt *= dmgReduction;

    if (e.shield > 0) { if (amt > e.shield) { amt -= e.shield; e.shield = 0; } else { e.shield -= amt; amt = 0; } }
    e.hp -= amt;
    
    floatingTexts.push({ x: e.x + (Math.random()-0.5)*10, y: e.y - 15 + (Math.random()-0.5)*10, text: Math.floor(amt), color: isCrit ? '#ffd700' : '#ffffff', life: 30, maxLife: 30 });

    if (e.hp <= 0 && !e.dead) {
        e.dead = true; gold += (e.isBoss ? 20 : 1) * (midasActive ? 2 : 1);
        let expDrop = (e.isBoss ? 2 : 0) * (expActive ? 2 : 1);
        if (expDrop > 0) exp += expDrop;
        createParticles(e.x, e.y, e.isBoss ? '#800080' : '#ff0000');
    }
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const gridX = Math.floor((e.clientX - rect.left) / CELL_SIZE), gridY = Math.floor((e.clientY - rect.top) / CELL_SIZE);
    let clickedStone = stones.find(s => s.x === gridX && s.y === gridY), clickedTower = towers.find(t => t.x === gridX && t.y === gridY);
    let clickedSpawnIndex = unrevealedSpawns.findIndex(s => s.x === gridX && s.y === gridY);

    if (state === STATES.SWAPPING) {
        let target = clickedTower || clickedStone;
        if (target && target !== swapSource) {
            let tempX = swapSource.x, tempY = swapSource.y;
            swapSource.x = target.x; swapSource.y = target.y;
            target.x = tempX; target.y = tempY;
            grid[swapSource.y][swapSource.x] = swapSource.element ? 'TOWER' : 'STONE';
            grid[target.y][target.x] = target.element ? 'TOWER' : 'STONE';
            cachedPath = calculateFullPath(); state = preSwapState; swapSource = null; updateUI();
        } else if (target === swapSource) {
            gold += 20; shopBought.find((val, idx) => currentShop[idx].id === 'swap' ? shopBought[idx] = false : null);
            state = preSwapState; swapSource = null; updateUI();
        }
        return; 
    }

    if (state === STATES.BUILD_PLACE) {
        if (clickedTower) { selectedTower = clickedTower; selectedStone = null; selectedSpawnIndex = -1; updateUI(); } 
        else if (clickedStone) { selectedStone = clickedStone; selectedTower = null; selectedSpawnIndex = -1; updateUI(); } 
        else if (canPlace(gridX, gridY)) {
            let roll = rollElement(); unrevealedSpawns.push({x: gridX, y: gridY, element: roll.element, tier: roll.tier, isRevealed: true}); 
            grid[gridY][gridX] = 'TEMP';
            cachedPath = calculateFullPath();
            selectedTower = null; selectedStone = null; selectedSpawnIndex = -1; updateUI();
            if (unrevealedSpawns.length === currentMaxSpawns) { state = STATES.BUILD_SELECT; updateUI(); }
        }
    } else if (state === STATES.BUILD_SELECT) {
        if (clickedSpawnIndex >= 0) { selectedSpawnIndex = clickedSpawnIndex; selectedTower = null; selectedStone = null; } 
        else if (clickedTower) { selectedTower = clickedTower; selectedSpawnIndex = -1; selectedStone = null; } 
        else if (clickedStone) { selectedStone = clickedStone; selectedSpawnIndex = -1; selectedTower = null; } 
        else { selectedSpawnIndex = -1; selectedTower = null; selectedStone = null; }
        updateUI();
    } else if (state === STATES.BUILD_COMBINE || state === STATES.WAVE) {
        if (clickedStone && state !== STATES.WAVE) { selectedStone = clickedStone; selectedTower = null; } 
        else if (clickedTower) { selectedTower = clickedTower; selectedStone = null; } 
        else { selectedTower = null; selectedStone = null; }
        selectedSpawnIndex = -1; updateUI();
    }
});

function drawRect(x, y, color, sizeRatio = 1.0) {
    let offset = (CELL_SIZE - (CELL_SIZE * sizeRatio)) / 2; ctx.fillStyle = color; ctx.fillRect(x * CELL_SIZE + offset, y * CELL_SIZE + offset, CELL_SIZE * sizeRatio, CELL_SIZE * sizeRatio);
}

function drawTowerBase(x, y, color, sizeRatio, tier) {
    let offset = (CELL_SIZE - (CELL_SIZE * sizeRatio)) / 2; let size = CELL_SIZE * sizeRatio;
    ctx.fillStyle = color; ctx.fillRect(x * CELL_SIZE + offset, y * CELL_SIZE + offset, size, size);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.strokeRect(x * CELL_SIZE + offset, y * CELL_SIZE + offset, size, size);
    ctx.fillStyle = '#fff'; ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    let cx = x * CELL_SIZE + CELL_SIZE/2, cy = y * CELL_SIZE + CELL_SIZE/2, dotOffset = size * 0.25, dotRadius = 1.5 + (sizeRatio * 1);
    ctx.beginPath();
    if (tier === 1 || tier === 3 || tier === 5) { ctx.moveTo(cx + dotRadius, cy); ctx.arc(cx, cy, dotRadius, 0, Math.PI*2); }
    if (tier >= 2) { ctx.moveTo(cx - dotOffset + dotRadius, cy - dotOffset); ctx.arc(cx - dotOffset, cy - dotOffset, dotRadius, 0, Math.PI*2); ctx.moveTo(cx + dotOffset + dotRadius, cy + dotOffset); ctx.arc(cx + dotOffset, cy + dotOffset, dotRadius, 0, Math.PI*2); }
    if (tier >= 4) { ctx.moveTo(cx + dotOffset + dotRadius, cy - dotOffset); ctx.arc(cx + dotOffset, cy - dotOffset, dotRadius, 0, Math.PI*2); ctx.moveTo(cx - dotOffset + dotRadius, cy + dotOffset); ctx.arc(cx - dotOffset, cy + dotOffset, dotRadius, 0, Math.PI*2); }
    ctx.fill(); ctx.stroke();
}

function drawStonePyramid(x, y) {
    let sz = CELL_SIZE * 0.9, offset = (CELL_SIZE - sz) / 2, px = x * CELL_SIZE + offset, py = y * CELL_SIZE + offset, cx = px + sz/2, cy = py + sz/2;
    ctx.fillStyle = '#777'; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px+sz, py); ctx.lineTo(cx, cy); ctx.fill();
    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.moveTo(px, py+sz); ctx.lineTo(px+sz, py+sz); ctx.lineTo(cx, cy); ctx.fill();
    ctx.fillStyle = '#555'; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py+sz); ctx.lineTo(cx, cy); ctx.fill();
    ctx.fillStyle = '#444'; ctx.beginPath(); ctx.moveTo(px+sz, py); ctx.lineTo(px+sz, py+sz); ctx.lineTo(cx, cy); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(px, py, sz, sz);
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px+sz, py+sz); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+sz, py); ctx.lineTo(px, py+sz); ctx.stroke();
}

function createParticles(x, y, color) { for (let i=0; i<10; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 20+Math.random()*10, color: color }); }

function gameLoop() {
    frames++;
    if (state === STATES.WAVE) {
        if (waveEnemiesToSpawn > 0 && frames % 30 === 0) { spawnEnemy(); waveEnemiesToSpawn--; updateUI(); }

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            e.armorDebuff = 0; e.slowAuraDebuff = 0;
        }

        // Pass 3: Tower Auras on Enemies
        for (let t of towers) {
            if (t.isCombo && t.recipe) {
                let rPx = (t.range + (t.buffs.permRng||0)) * CELL_SIZE;
                let rt = t.recipe.auraTarget;
                if (rt === 'PIERCE_ENEMY' || rt === 'DARK_OMNI') for (let e of enemies) if (Math.hypot(e.x - (t.x*CELL_SIZE+CELL_SIZE/2), e.y - (t.y*CELL_SIZE+CELL_SIZE/2)) <= rPx) e.armorDebuff += (rt === 'DARK_OMNI' ? 30 : t.recipe.auraValue);
                if (rt === 'SLOW_ENEMY' || rt === 'DARK_OMNI') for (let e of enemies) if (Math.hypot(e.x - (t.x*CELL_SIZE+CELL_SIZE/2), e.y - (t.y*CELL_SIZE+CELL_SIZE/2)) <= rPx) e.slowAuraDebuff += (rt === 'DARK_OMNI' ? 0.4 : t.recipe.auraValue);
            }
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i], currentSpeed = e.speed;
            
            if (e.zaWarudoTimer > 0) { currentSpeed *= 0.2; e.zaWarudoTimer--; }
            if (e.buffs.includes('PHASING')) {
                if (e.phaseTimer > 0) { e.phaseTimer--; currentSpeed *= 0.5; if (e.phaseTimer <= 0) e.phaseCooldown = 180; } 
                else { if (e.phaseCooldown > 0) e.phaseCooldown--; else e.phaseTimer = 120; }
            }
            if (e.stunTimer > 0) { currentSpeed = 0; e.stunTimer--; }
            if (e.freezeTimer > 0) { currentSpeed = 0; e.freezeTimer--; } else if (e.slowTimer > 0) { currentSpeed *= 0.6; e.slowTimer--; }
            if (e.slowAuraDebuff > 0) { currentSpeed *= Math.max(0.1, 1 - e.slowAuraDebuff); }
            if (e.burnTimer > 0) { if (frames % 30 === 0) damageEnemy(e, e.maxHp * 0.02 + 5, null); e.burnTimer--; }
            if (e.poisonTimer > 0) { if (frames % 30 === 0) damageEnemy(e, e.poisonDmg, null); e.poisonTimer--; }
            if (e.buffs.includes('REGEN') && e.hp < e.maxHp) e.hp = Math.min(e.maxHp, e.hp + (e.maxHp * 0.05)/60);
            if (e.buffs.includes('DASH') && e.dashTimer > 0) { currentSpeed *= 1.5; e.dashTimer--; }

            if (e.pathIndex < cachedPath.length - 1) {
                let target = cachedPath[e.pathIndex + 1], tx = target.x * CELL_SIZE + CELL_SIZE/2, ty = target.y * CELL_SIZE + CELL_SIZE/2;
                let dx = tx - e.x, dy = ty - e.y, dist = Math.hypot(dx, dy);
                if (dist < currentSpeed) { e.x = tx; e.y = ty; e.pathIndex++; } else { e.x += (dx / dist) * currentSpeed; e.y += (dy / dist) * currentSpeed; }
            } else {
                lives--; e.dead = true; leakedThisWave = true;
                if (lives <= 0) { state = STATES.GAME_OVER; updateUI(); }
            }

            if (e.buffs.includes('JUMPER') && !e.dead) {
                if (e.hp / e.maxHp <= e.lastJumpThreshold && e.lastJumpThreshold > 0) {
                    e.lastJumpThreshold -= 0.2;
                    e.pathIndex += Math.floor(Math.random() * 3) + 2; 
                    if (e.pathIndex >= cachedPath.length - 1) e.pathIndex = cachedPath.length - 2;
                    let target = cachedPath[e.pathIndex];
                    createParticles(e.x, e.y, '#2196F3'); 
                    e.x = target.x * CELL_SIZE + CELL_SIZE/2; e.y = target.y * CELL_SIZE + CELL_SIZE/2;
                    createParticles(e.x, e.y, '#2196F3'); 
                }
            }
        }
        enemies = enemies.filter(e => !e.dead);

        for (let t of towers) { t.buffs = { damage: 0, speed: 0, crit: 0, range: 0, pierce: 0, trueSight: false, antiCC: false }; t.enemyDebuffs = { disarmed: false, spdReduction: 0 }; }
        
        for (let t of towers) {
            let rPx = ((t.range + (t.buffs.permRng||0)) * CELL_SIZE);
            if (t.seeInvisible) { for (let other of towers) if (Math.hypot((other.x - t.x)*CELL_SIZE, (other.y - t.y)*CELL_SIZE) <= rPx) other.buffs.trueSight = true; t.buffs.trueSight = true; }
            if (t.isCombo && t.recipe && t.recipe.type === 'SUPPORT') {
                for (let other of towers) {
                    if (t === other) continue;
                    if (Math.hypot((other.x - t.x)*CELL_SIZE, (other.y - t.y)*CELL_SIZE) <= rPx) {
                        let rt = t.recipe.auraTarget; let rv = t.recipe.auraValue;
                        if (rt === 'SPEED') other.buffs.speed += rv; if (rt === 'DAMAGE') other.buffs.damage += rv;
                        if (rt === 'CRIT') other.buffs.crit += rv; if (rt === 'RANGE') other.buffs.range += rv;
                        if (rt === 'PIERCE') other.buffs.pierce += rv; if (rt === 'TRUE_SIGHT') other.buffs.trueSight = true;
                        if (rt === 'ANTI_CC' || rt === 'DARK_OMNI') other.buffs.antiCC = true;
                        if (rt === 'OMNI') { other.buffs.antiCC = true; other.buffs.trueSight = true; other.buffs.speed += 0.8; other.buffs.damage += 0.8; other.buffs.crit += 0.3;  other.buffs.pierce += 0.3; }
                        if (rt === 'BURN' && frames % 30 === 0) for (let e of enemies) if (Math.hypot(e.x - (t.x*CELL_SIZE+CELL_SIZE/2), e.y - (t.y*CELL_SIZE+CELL_SIZE/2)) <= rPx) damageEnemy(e, rv, t);
                    }
                }
            }
        }

        for (let e of enemies) {
            if (e.buffs.includes('DISARM_AURA')) { let rPx = 3 * CELL_SIZE; for (let t of towers) if (!t.buffs.antiCC && Math.hypot(e.x - (t.x*CELL_SIZE+CELL_SIZE/2), e.y - (t.y*CELL_SIZE+CELL_SIZE/2)) <= rPx) t.enemyDebuffs.disarmed = true; }
            if (e.buffs.includes('SLOW_AURA')) { let rPx = 3 * CELL_SIZE; for (let t of towers) if (!t.buffs.antiCC && Math.hypot(e.x - (t.x*CELL_SIZE+CELL_SIZE/2), e.y - (t.y*CELL_SIZE+CELL_SIZE/2)) <= rPx) t.enemyDebuffs.spdReduction = Math.min(0.8, waveNumber * 0.02); }
        }

        for (let t of towers) {
            if (t.recipe && (t.recipe.auraTarget === 'BURN' || t.recipe.auraTarget === 'PIERCE_ENEMY' || t.recipe.auraTarget === 'SLOW_ENEMY' || t.recipe.auraTarget === 'DARK_OMNI')) continue; 
            if (t.enemyDebuffs.disarmed) continue;
            
            if (t.cooldown > 0) t.cooldown--;
            else {
                let px = t.x * CELL_SIZE + CELL_SIZE/2, py = t.y * CELL_SIZE + CELL_SIZE/2, rangePx = (t.range + (t.buffs.permRng||0) + t.buffs.range) * CELL_SIZE;
                let targets = []; let maxTargets = t.multiTarget || 1;
                for (let e of enemies) {
                    if (e.invisible && !t.seeInvisible && !t.buffs.trueSight) continue;
                    if (t.element.type === 'GRND' && e.type === 'AIR') continue;
                    if (t.element.type === 'AIR' && e.type === 'GRND') continue;
                    if (Math.hypot(e.x - px, e.y - py) <= rangePx) { targets.push(e); if (targets.length >= maxTargets) break; }
                }

                if (targets.length > 0) {
                    let effSpeed = t.baseSpeed / (1 + t.buffs.speed + (t.buffs.permSpd||0));
                    effSpeed /= (1 - t.enemyDebuffs.spdReduction);
                    for (let tgt of targets) projectiles.push({ x: px, y: py, target: tgt, tower: t, speed: 10, chain: t.chain, hitList: [] });
                    t.cooldown = Math.max(5, effSpeed); 
                }
            }
        }

        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            if (p.target.dead) { projectiles.splice(i, 1); continue; }
            
            let dx = p.target.x - p.x, dy = p.target.y - p.y, dist = Math.hypot(dx, dy);
            if (dist < p.speed) {
                let dmg = p.tower.baseDamage * (1 + p.tower.buffs.damage + (p.tower.buffs.permDmg||0));
                let critMult = 1.5 + (p.tower.critMultBonus || 0);
                let isCrit = Math.random() < (p.tower.baseCrit + p.tower.buffs.crit + (p.tower.buffs.permCrit||0));
                if (isCrit) dmg *= critMult;

                if (p.tower.splash) {
                    let sRad = p.tower.splash * CELL_SIZE;
                    for (let e of enemies) {
                        if (Math.hypot(e.x - p.target.x, e.y - p.target.y) < sRad) {
                            damageEnemy(e, dmg * 0.5, p.tower, isCrit);
                            if (p.tower.slow && !e.buffs.includes('IMMUNE')) e.slowTimer = 60 * p.tower.tier;
                        }
                    }
                }
                
                damageEnemy(p.target, dmg, p.tower, isCrit);
                if (p.tower.burn) p.target.burnTimer = 60 * p.tower.tier;
                if (p.tower.poison) { p.target.poisonTimer = 60 * p.tower.tier; p.target.poisonDmg = p.tower.poison; }
                if (p.tower.slow && !p.target.buffs.includes('IMMUNE')) p.target.slowTimer = 60 * p.tower.tier;
                if (p.tower.stunChc && Math.random() < p.tower.stunChc && !p.target.buffs.includes('IMMUNE')) p.target.stunTimer = p.tower.stunDur;
                
                if (p.tower.freezeChc && Math.random() < p.tower.freezeChc && !p.target.buffs.includes('IMMUNE') && p.target.freezeCount < 5) { 
                    p.target.freezeTimer = p.tower.freezeDur; p.target.freezeCount++; 
                }
                
                createParticles(p.target.x, p.target.y, isCrit ? '#ffffff' : (p.tower.isCombo ? p.tower.comboColor : p.tower.element.color));
                
                if (p.chain > 0) {
                    p.hitList.push(p.target);
                    let nextTarget = enemies.find(en => en !== p.target && !en.dead && Math.hypot(en.x - p.target.x, en.y - p.target.y) < CELL_SIZE*4 && !p.hitList.includes(en) && (!en.invisible || p.tower.seeInvisible || p.tower.buffs.trueSight));
                    if (nextTarget) { p.target = nextTarget; p.chain--; p.tower.baseDamage *= 0.8; continue; }
                }
                projectiles.splice(i, 1);
            } else { p.x += (dx / dist) * p.speed; p.y += (dy / dist) * p.speed; }
        }

        for (let i = particles.length - 1; i >= 0; i--) { let pt = particles[i]; pt.x += pt.vx; pt.y += pt.vy; pt.life--; if (pt.life <= 0) particles.splice(i, 1); }
        for (let i = floatingTexts.length - 1; i >= 0; i--) { let ft = floatingTexts[i]; ft.y -= 1; ft.life--; if (ft.life <= 0) floatingTexts.splice(i, 1); }

        if (waveEnemiesToSpawn === 0 && enemies.length === 0 && state === STATES.WAVE) {
            waveClearText = "WAVE " + waveNumber + " CLEARED!";
            waveClearTimer = 120;
            exp += 2 * (expActive ? 2 : 1); waveNumber++; 
            if (!leakedThisWave) bonusEnemies++; else bonusEnemies = Math.max(0, bonusEnemies - 1);
            currentMaxSpawns = 5; midasActive = false; expActive = false; // Reset buffs
            precalculateWave(); state = STATES.BUILD_PLACE;
            selectedTower = null; selectedStone = null; projectiles = []; particles = []; floatingTexts = []; updateUI();
        }
    }

    for(let t of towers) {
        if (t.isCombo && (t.comboColor === '#FFFFCC' || t.comboColor === '#4B0082')) {
            if (Math.random() < 0.1) { particles.push({ x: t.x * CELL_SIZE + CELL_SIZE/2 + (Math.random()-0.5)*20, y: t.y * CELL_SIZE + CELL_SIZE/2 + (Math.random()-0.5)*20, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2 - 1, life: 15, color: '#FFD700' }); }
        }
    }

    ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    
    // Faint grid
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0; i<=COLS; i++) { 
        ctx.moveTo(i*CELL_SIZE, 0); ctx.lineTo(i*CELL_SIZE, CANVAS_SIZE); 
        ctx.moveTo(0, i*CELL_SIZE); ctx.lineTo(CANVAS_SIZE, i*CELL_SIZE); 
    }
    ctx.stroke();
    
    if (state === STATES.BUILD_PLACE) ctx.fillStyle = 'rgba(255,0,0,0.1)'; WAYPOINTS.forEach(wp => { ctx.fillRect(wp.x*CELL_SIZE, wp.y*CELL_SIZE, CELL_SIZE, CELL_SIZE); });

    if (cachedPath.length > 0) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.025)'; 
        ctx.lineWidth = CELL_SIZE; 
        ctx.lineCap = 'square'; 
        ctx.lineJoin = 'miter'; 
        ctx.beginPath();
        for (let i=0; i<cachedPath.length; i++) { 
            let px = cachedPath[i].x * CELL_SIZE + CELL_SIZE/2; 
            let py = cachedPath[i].y * CELL_SIZE + CELL_SIZE/2; 
            if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py); 
        }
        ctx.stroke();

        let pathLen = cachedPath.length - 1;
        if (pathLen > 0) {
            let framesPerCell = 2.5; let totalFrames = pathLen * framesPerCell; let currentFrame = frames % totalFrames; let progressCells = currentFrame / framesPerCell;
            
            if (currentFrame === 0 || progressCells < 0.1) arrowTrail = [];
            
            let i = Math.floor(progressCells);
            if (i < pathLen) {
                let progress = progressCells - i; let p1 = cachedPath[i], p2 = cachedPath[i+1];
                let cx = (p1.x + (p2.x - p1.x) * progress) * CELL_SIZE + CELL_SIZE/2; let cy = (p1.y + (p2.y - p1.y) * progress) * CELL_SIZE + CELL_SIZE/2; let angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                
                arrowTrail.push({x: cx, y: cy});
                if (arrowTrail.length > 40) arrowTrail.shift();
                
                ctx.lineCap = 'round';
                ctx.lineWidth = CELL_SIZE * 0.15;
                for (let j = 0; j < arrowTrail.length - 1; j++) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.5 * (j / arrowTrail.length)})`;
                    ctx.beginPath();
                    ctx.moveTo(arrowTrail[j].x, arrowTrail[j].y);
                    ctx.lineTo(arrowTrail[j+1].x, arrowTrail[j+1].y);
                    ctx.stroke();
                }

                ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath(); ctx.moveTo(-10, -10); ctx.lineTo(12, 0); ctx.lineTo(-10, 10); ctx.fill(); ctx.restore();
            }
        }
    }

    WAYPOINTS.forEach((wp, idx) => { 
        let cx = wp.x * CELL_SIZE + CELL_SIZE/2;
        let cy = wp.y * CELL_SIZE + CELL_SIZE/2;

        ctx.save();
        ctx.translate(cx, cy);
        
        ctx.rotate(frames * 0.02);
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.5)';
        ctx.lineWidth = 2;
        ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.arc(0, 0, CELL_SIZE * 0.4, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.rotate(-frames * 0.05);
        ctx.fillStyle = 'rgba(0, 255, 255, 0.15)';
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let k=0; k<6; k++) {
            let a = k * Math.PI / 3;
            if(k===0) ctx.moveTo(Math.cos(a)*CELL_SIZE*0.25, Math.sin(a)*CELL_SIZE*0.25);
            else ctx.lineTo(Math.cos(a)*CELL_SIZE*0.25, Math.sin(a)*CELL_SIZE*0.25);
        }
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        
        ctx.restore();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; 
        ctx.font = 'bold 14px monospace'; 
        ctx.textAlign = 'center'; 
        ctx.textBaseline = 'middle';
        ctx.fillText(idx + 1, cx, cy);
    });

    for (let s of stones) { drawStonePyramid(s.x, s.y); if (selectedStone === s || (state === STATES.SWAPPING && swapSource === s)) { ctx.strokeStyle = state === STATES.SWAPPING ? '#FFD700' : '#f44336'; ctx.lineWidth = 2; ctx.strokeRect(s.x*CELL_SIZE, s.y*CELL_SIZE, CELL_SIZE, CELL_SIZE); } }
    
    for (let i=0; i<unrevealedSpawns.length; i++) { 
        let s = unrevealedSpawns[i]; drawTowerBase(s.x, s.y, s.element.color, 0.5+(s.tier*0.1), s.tier); 
        if (s.glowColor) { let pulse = 1.2 + Math.sin(frames * 0.1) * 0.1; ctx.fillStyle = s.glowColor; ctx.globalAlpha = 0.4; ctx.beginPath(); ctx.arc(s.x*CELL_SIZE+CELL_SIZE/2, s.y*CELL_SIZE+CELL_SIZE/2, (CELL_SIZE/2)*pulse, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; }
        if (i === selectedSpawnIndex) { ctx.strokeStyle = 'yellow'; ctx.lineWidth=2; ctx.strokeRect(s.x*CELL_SIZE, s.y*CELL_SIZE, CELL_SIZE, CELL_SIZE); ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(s.x*CELL_SIZE+CELL_SIZE/2, s.y*CELL_SIZE+CELL_SIZE/2, s.element.range * CELL_SIZE, 0, Math.PI*2); ctx.stroke(); } 
    }

    for (let t of towers) {
        let size = Math.min(0.95, 0.5 + (t.tier * 0.08));
        if (t.glowColor) { let pulse = 1.2 + Math.sin(frames * 0.1) * 0.1; ctx.fillStyle = t.glowColor; ctx.globalAlpha = 0.4; ctx.beginPath(); ctx.arc(t.x*CELL_SIZE+CELL_SIZE/2, t.y*CELL_SIZE+CELL_SIZE/2, (CELL_SIZE/2)*pulse, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; }
        
        if (t.isCombo) {
            let cx = t.x * CELL_SIZE + CELL_SIZE/2, cy = t.y * CELL_SIZE + CELL_SIZE/2, rad = (CELL_SIZE/2) * size;
            ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = t.comboColor; ctx.lineWidth = 2; ctx.stroke();
            ctx.save(); ctx.translate(cx, cy); ctx.rotate(frames * 0.02);
            if (t.recipe && t.recipe.type === 'SUPPORT') {
                ctx.strokeStyle = t.comboColor; ctx.lineWidth = 3;
                for (let k = 0; k < 6; k++) { ctx.rotate(Math.PI / 3); ctx.beginPath(); ctx.moveTo(rad * 0.4, 0); ctx.lineTo(rad * 0.8, rad * 0.2); ctx.lineTo(rad * 0.6, rad * 0.6); ctx.stroke(); }
                ctx.rotate(-frames * 0.04); ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(0, 0, rad * 0.5, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = t.comboColor; ctx.beginPath(); ctx.arc(0, 0, rad * 0.3, 0, Math.PI*2); ctx.fill();
            } else {
                let spikes = 8; ctx.fillStyle = t.comboColor; ctx.beginPath();
                for(let k=0; k<spikes*2; k++) { let rInner = (k%2===0) ? rad * 0.95 : rad * 0.4; let a = (k * Math.PI) / spikes; if(k===0) ctx.moveTo(Math.cos(a)*rInner, Math.sin(a)*rInner); else ctx.lineTo(Math.cos(a)*rInner, Math.sin(a)*rInner); }
                ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.rotate(-frames * 0.05); ctx.fillStyle = '#FFF'; ctx.beginPath();
                for(let k=0; k<4*2; k++) { let rInner = (k%2===0) ? rad * 0.5 : rad * 0.15; let a = (k * Math.PI) / 4; if(k===0) ctx.moveTo(Math.cos(a)*rInner, Math.sin(a)*rInner); else ctx.lineTo(Math.cos(a)*rInner, Math.sin(a)*rInner); }
                ctx.closePath(); ctx.fill();
            }
            ctx.restore();
        } else drawTowerBase(t.x, t.y, t.element.color, size, t.tier);

        if (selectedTower === t || (state === STATES.SWAPPING && swapSource === t)) {
            ctx.strokeStyle = state === STATES.SWAPPING ? '#FFD700' : '#2196F3'; ctx.lineWidth = 2; ctx.strokeRect(t.x*CELL_SIZE + 1, t.y*CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(t.x*CELL_SIZE+CELL_SIZE/2, t.y*CELL_SIZE+CELL_SIZE/2, (t.range+(t.buffs.permRng||0)+t.buffs.range) * CELL_SIZE, 0, Math.PI*2); ctx.stroke();
        }
        if (t.enemyDebuffs && t.enemyDebuffs.disarmed) { ctx.strokeStyle = 'red'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(t.x*CELL_SIZE, t.y*CELL_SIZE); ctx.lineTo(t.x*CELL_SIZE+CELL_SIZE, t.y*CELL_SIZE+CELL_SIZE); ctx.stroke(); }
        else if (t.enemyDebuffs && t.enemyDebuffs.spdReduction > 0) { ctx.fillStyle = 'rgba(30,144,255,0.4)'; ctx.fillRect(t.x*CELL_SIZE, t.y*CELL_SIZE, CELL_SIZE, CELL_SIZE); }
    }

    for (let e of enemies) {
        let drawY = e.type === 'AIR' ? e.y - 20 : e.y; let r = e.isBoss ? 16 : 10; 
        
        if (e.zaWarudoTimer > 0) { ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, drawY, r * 1.8, 0, Math.PI*2); ctx.stroke(); }
        if (e.phaseTimer > 0) { ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, drawY, r + 4, 0, Math.PI*2); ctx.stroke(); }

        if (e.isBoss) {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 3; ctx.fillStyle = '#ddd'; ctx.beginPath();
            ctx.moveTo(e.x - r*0.4, drawY - r*0.7); ctx.lineTo(e.x - r*1.2, drawY - r*1.6); ctx.lineTo(e.x, drawY - r*0.9);
            ctx.moveTo(e.x + r*0.4, drawY - r*0.7); ctx.lineTo(e.x + r*1.2, drawY - r*1.6); ctx.lineTo(e.x, drawY - r*0.9);
            ctx.fill(); if (!e.invisible) ctx.stroke();
            ctx.fillStyle = e.invisible ? 'rgba(255,255,255,0.3)' : '#800080';
            if (e.type === 'GRND') {
                let legExt = r * 1.6, wiggle = Math.sin(frames * 0.3) * 0.5; ctx.beginPath();
                for(let j=0; j<4; j++) {
                    let a1 = (j * Math.PI / 2) + Math.PI/4 + wiggle; let a2 = (j * Math.PI / 2) + Math.PI/4 - wiggle;
                    ctx.moveTo(e.x, drawY); ctx.lineTo(e.x + Math.cos(a1)*legExt, drawY + Math.sin(a1)*legExt);
                    ctx.moveTo(e.x, drawY); ctx.lineTo(e.x + Math.cos(a2)*legExt, drawY + Math.sin(a2)*legExt);
                }
                if (!e.invisible) ctx.stroke(); ctx.beginPath(); ctx.arc(e.x, drawY, r, 0, Math.PI*2); ctx.fill(); if (!e.invisible) ctx.stroke();
            } else {
                let wingSpan = r * 2.5, flap = Math.sin(frames * 0.4) * r;
                ctx.beginPath(); ctx.moveTo(e.x, drawY); ctx.lineTo(e.x - wingSpan, drawY - flap); ctx.lineTo(e.x - wingSpan/2, drawY + r); ctx.fill(); if (!e.invisible) ctx.stroke();
                ctx.beginPath(); ctx.moveTo(e.x, drawY); ctx.lineTo(e.x + wingSpan, drawY - flap); ctx.lineTo(e.x + wingSpan/2, drawY + r); ctx.fill(); if (!e.invisible) ctx.stroke();
                ctx.beginPath(); ctx.arc(e.x, drawY, r*0.9, 0, Math.PI*2); ctx.fill(); if (!e.invisible) ctx.stroke();
            }
            ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.ellipse(e.x - r*0.4, drawY - r*0.2, r*0.3, r*0.15, 0.3, 0, Math.PI*2); ctx.ellipse(e.x + r*0.4, drawY - r*0.2, r*0.3, r*0.15, -0.3, 0, Math.PI*2); ctx.fill();
        } 
        else if (e.type === 'GRND') {
            ctx.fillStyle = e.invisible ? 'rgba(255,255,255,0.3)' : '#FF0000'; ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 3;
            let legExt = r * 1.6, wiggle = Math.sin(frames * 0.3) * 0.5; ctx.beginPath();
            for(let j=0; j<4; j++) {
                let a1 = (j * Math.PI / 2) + Math.PI/4 + wiggle; let a2 = (j * Math.PI / 2) + Math.PI/4 - wiggle;
                ctx.moveTo(e.x, drawY); ctx.lineTo(e.x + Math.cos(a1)*legExt, drawY + Math.sin(a1)*legExt);
                ctx.moveTo(e.x, drawY); ctx.lineTo(e.x + Math.cos(a2)*legExt, drawY + Math.sin(a2)*legExt);
            }
            if(!e.invisible) ctx.stroke();
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(e.x, drawY, r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = e.invisible ? 'rgba(255,255,255,0.3)' : '#FF0000'; ctx.beginPath(); ctx.arc(e.x, drawY, r*0.6, 0, Math.PI*2); ctx.fill(); if(e.invisible) ctx.stroke();
        } else {
            let wingSpan = r * 2.5, flap = Math.sin(frames * 0.4) * r;
            ctx.fillStyle = e.invisible ? 'rgba(255,255,255,0.3)' : '#E0FFFF'; ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(e.x, drawY); ctx.lineTo(e.x - wingSpan, drawY - flap); ctx.lineTo(e.x - wingSpan/2, drawY + r); ctx.fill(); if(!e.invisible) ctx.stroke();
            ctx.beginPath(); ctx.moveTo(e.x, drawY); ctx.lineTo(e.x + wingSpan, drawY - flap); ctx.lineTo(e.x + wingSpan/2, drawY + r); ctx.fill(); if(!e.invisible) ctx.stroke();
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(e.x, drawY, r*0.8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = e.invisible ? 'rgba(255,255,255,0.3)' : '#E0FFFF'; ctx.beginPath(); ctx.arc(e.x, drawY, r*0.4, 0, Math.PI*2); ctx.fill(); if(e.invisible) ctx.stroke();
        }
        
        if (e.freezeTimer > 0) { ctx.fillStyle = 'rgba(0,255,255,0.5)'; ctx.fillRect(e.x-r, drawY-r, r*2, r*2); }
        if (e.stunTimer > 0) { ctx.strokeStyle = '#ffff00'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x, drawY, r+4, 0, Math.PI*2); ctx.stroke(); }
        if (e.buffs.includes('SHIELD') && e.shield > 0) { ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(e.x, drawY, r + 3, 0, Math.PI*2); ctx.stroke(); }
        if (e.buffs.includes('REGEN')) { ctx.fillStyle = '#00ff00'; ctx.fillRect(e.x - 2, drawY - 2, 4, 4); }
        if (e.buffs.includes('DASH') && e.dashTimer > 0) { ctx.strokeStyle = '#ffffff'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(e.x, drawY); ctx.lineTo(e.x - (e.speed * 4), drawY); ctx.stroke(); }
        if (e.buffs.includes('IMMUNE')) { ctx.fillStyle = '#ff00ff'; ctx.fillRect(e.x - 4, drawY - 4, 8, 8); }
        
        if (e.buffs.includes('DISARM_AURA')) { ctx.strokeStyle = 'rgba(255, 140, 0, 0.4)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(e.x, drawY, 3*CELL_SIZE, 0, Math.PI*2); ctx.stroke(); }
        if (e.buffs.includes('SLOW_AURA')) { ctx.strokeStyle = 'rgba(30, 144, 255, 0.4)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(e.x, drawY, 3*CELL_SIZE, 0, Math.PI*2); ctx.stroke(); }

        let hpY = drawY - r - 8; ctx.fillStyle = 'red'; ctx.fillRect(e.x - 12, hpY, 24, 4); ctx.fillStyle = 'lime'; ctx.fillRect(e.x - 12, hpY, 24 * (e.hp/e.maxHp), 4);
    }

    for (let p of projectiles) { 
        if (p.tower.isCombo) {
            let dx = p.target.x - p.x, dy = p.target.y - p.y, angle = Math.atan2(dy, dx);
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(angle);
            ctx.fillStyle = p.tower.comboColor; if (p.tower.chain > 0) ctx.fillStyle = '#E0FFFF';
            ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.moveTo(14, 0); ctx.lineTo(-6, 8); ctx.lineTo(-2, 0); ctx.lineTo(-6, -8); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-2, 3); ctx.lineTo(0, 0); ctx.lineTo(-2, -3); ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0; ctx.restore();
            particles.push({ x: p.x + (Math.random()-0.5)*5, y: p.y + (Math.random()-0.5)*5, vx: -dx*0.05, vy: -dy*0.05, life: 15, color: ctx.fillStyle });
        } else { ctx.fillStyle = p.tower.element.color; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); }
    }
    
    for (let pt of particles) { ctx.fillStyle = pt.color; ctx.globalAlpha = pt.life / 30; ctx.fillRect(pt.x, pt.y, 3, 3); }
    ctx.globalAlpha = 1.0;
    
    for (let ft of floatingTexts) { ctx.globalAlpha = ft.life / ft.maxLife; ctx.fillStyle = ft.color; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.fillText(ft.text, ft.x, ft.y); }
    ctx.globalAlpha = 1.0;

    if (waveClearTimer > 0) {
        ctx.fillStyle = `rgba(0, 0, 0, ${Math.min(0.7, waveClearTimer / 20)})`;
        ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
        
        ctx.save();
        ctx.translate(CANVAS_SIZE/2, CANVAS_SIZE/2);
        let scale = 0.5 + (120 - waveClearTimer) * 0.0025; // 50% scale
        ctx.scale(scale, scale);
        ctx.globalAlpha = Math.min(1, waveClearTimer / 30);
        ctx.font = 'bold 60px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        ctx.fillStyle = '#000';
        ctx.lineWidth = 6;
        ctx.strokeText(waveClearText, 0, 0);
        
        ctx.fillStyle = '#FFD700';
        ctx.fillText(waveClearText, 0, 0);
        ctx.restore();
        
        waveClearTimer--;
    }

    if (state !== STATES.GAME_OVER) requestAnimationFrame(gameLoop);
    else { ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CANVAS_SIZE, CANVAS_SIZE); ctx.fillStyle = 'white'; ctx.font = '40px Arial'; ctx.fillText("GAME OVER", CANVAS_SIZE/2 - 120, CANVAS_SIZE/2); }
}

precalculateWave(); refreshShop(); cachedPath = calculateFullPath(); updateUI(); requestAnimationFrame(gameLoop);
</script>
</body>
